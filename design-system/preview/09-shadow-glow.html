<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Shadow & Glow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;}
  body { background: var(--void-black); width:700px; padding: 32px; font-family:'DM Sans',sans-serif;}
  .grid { display:grid; grid-template-columns: repeat(3,1fr); gap: 24px;}
  .cell { background: var(--obsidian-blue); height: 110px; border:1px solid rgba(166,169,176,.15);
          display:flex; align-items:flex-end; padding: 10px;
          font-size: 10px; letter-spacing:.12em; text-transform: uppercase;
          color: var(--ash-silver);}
  .gold-glow   { box-shadow: 0 0 20px rgba(184, 138, 42, 0.45); border-color: var(--aged-gold);}
  .blue-glow   { box-shadow: 0 0 24px rgba(27, 79, 122, 0.55); border-color: var(--atlas-blue);}
  .violet-glow { box-shadow: 0 0 24px rgba(107, 63, 160, 0.55); border-color: #6B3FA0;}
  .ember-glow  { box-shadow: 0 0 22px rgba(168, 50, 40, 0.55);  border-color: #A83228;}
  .card-shadow { box-shadow: 0 8px 32px rgba(10,10,13,.7);}
  .inset       { box-shadow: inset 0 0 24px rgba(184, 138, 42, 0.40); border-color: var(--aged-gold);}
</style>
</head>
<body>
  <div class="grid">
    <div class="cell gold-glow">Glow · Gold</div>
    <div class="cell blue-glow">Glow · Atlas Blue</div>
    <div class="cell violet-glow">Glow · Mythic Violet</div>
    <div class="cell ember-glow">Glow · Ember</div>
    <div class="cell card-shadow">Card hover shadow</div>
    <div class="cell inset">Inset gold ritual</div>
  </div>
</body>
</html>
