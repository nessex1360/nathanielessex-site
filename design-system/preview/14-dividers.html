<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Dividers & Ornament</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;}
  body { background: var(--void-black); width:700px; padding: 36px 32px; font-family:'DM Sans',sans-serif;}
  .meta { font-size: 10px; letter-spacing:.12em; text-transform: uppercase; color: var(--ash-silver); margin: 14px 0 10px;}
  .div-thin  { width: 100%; height: 1px; background: var(--aged-gold); opacity: .4; margin: 0;}
  .div-wide  { width: 100%; height: 1px; background: var(--ash-silver); opacity: .15;}
  .div-tick  { display:flex; align-items:center; gap: 14px; color: var(--aged-gold);
               letter-spacing:.20em; font-size: 11px; text-transform: uppercase;
               font-family:'DM Sans',sans-serif;}
  .div-tick::before, .div-tick::after { content:""; flex:1; height:1px; background: var(--aged-gold); opacity:.4;}
  .ornaments { display:flex; gap:32px; align-items: center; font-family:'Cinzel',serif;
               font-size: 22px; color: var(--aged-gold); letter-spacing: 0.4em; padding: 8px 0;}
  .compass { width: 56px; height: 56px;}
</style>
</head>
<body>
  <div class="meta">Thin gold rule — section break</div>
  <div class="div-thin"></div>

  <div class="meta">Wide ash rule — subsection</div>
  <div class="div-wide"></div>

  <div class="meta">Tick divider with anchor label</div>
  <div class="div-tick">◈ Four Acts ◈</div>

  <div class="meta">Cinzel diamond ornament row</div>
  <div class="ornaments">
    ◈ ◆ ◇ §
    <svg class="compass" viewBox="0 0 64 64" fill="none" stroke="#B88A2A" stroke-width="1.2">
      <circle cx="32" cy="32" r="28"/>
      <circle cx="32" cy="32" r="22"/>
      <path d="M32 8 L36 32 L32 56 L28 32 Z" fill="#B88A2A" fill-opacity=".25"/>
      <path d="M8 32 L32 28 L56 32 L32 36 Z" fill="#B88A2A" fill-opacity=".15"/>
      <circle cx="32" cy="32" r="2" fill="#B88A2A"/>
    </svg>
  </div>
</body>
</html>
