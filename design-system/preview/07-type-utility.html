<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Utility Type — DM Sans</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;}
  body { background: var(--void-black); width:700px; padding: 28px;}
  .stack > * + * { margin-top: 14px; }
  .meta { font-family:'DM Sans',sans-serif; font-size: 10px; letter-spacing: 0.12em;
          text-transform: uppercase; color: var(--ash-silver); margin-bottom: 4px;}
  .label { font-family:'DM Sans',sans-serif; font-weight:500; font-size: 13px; letter-spacing: 0.12em;
           text-transform: uppercase; color: var(--ash-silver);}
  .nav { font-family:'DM Sans',sans-serif; font-weight:500; font-size: 13px; letter-spacing: 0.12em;
         text-transform: uppercase; color: var(--signal-ivory);}
  .caption { font-family:'DM Sans',sans-serif; font-weight:400; font-size: 12px; letter-spacing: 0.12em;
             text-transform: uppercase; color: var(--ash-silver);}
  .micro   { font-family:'DM Sans',sans-serif; font-weight:400; font-size: 11px; letter-spacing: 0.10em;
             text-transform: uppercase; color: var(--ash-silver); opacity: 0.75;}
</style>
</head>
<body>
  <div class="stack">
    <div>
      <div class="meta">Nav / Active · DM Sans 500 · 13 · tracked 0.12em</div>
      <div class="nav">Home  ·  Portfolio  ·  Tinkerers  ·  Publishing  ·  About</div>
    </div>
    <div>
      <div class="meta">Section label · 500 · 13</div>
      <div class="label">Strategy. Systems. Impact.</div>
    </div>
    <div>
      <div class="meta">Caption · 400 · 12</div>
      <div class="caption">PRJ-002 · Sales Dashboard · Single source of truth</div>
    </div>
    <div>
      <div class="meta">Micro · 400 · 11</div>
      <div class="micro">Updated April 2026 · Tableau Public</div>
    </div>
  </div>
</body>
</html>
