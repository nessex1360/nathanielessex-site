<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;}
  body { background: var(--void-black); width:700px; padding: 28px; font-family:'DM Sans',sans-serif; color: var(--ash-silver);}
  .row { display:grid; grid-template-columns: 90px 60px 1fr; gap: 14px; align-items:center; padding: 6px 0;}
  .name { font-size: 11px; letter-spacing:.12em; text-transform: uppercase; color: var(--signal-ivory);}
  .px   { font-size: 11px; letter-spacing:.04em; color: var(--ash-silver); opacity: .75;}
  .bar  { height: 10px; background: var(--aged-gold); opacity: .85;}
</style>
</head>
<body>
  <div class="row"><div class="name">--space-1</div><div class="px">4 px</div><div class="bar" style="width:4px"></div></div>
  <div class="row"><div class="name">--space-2</div><div class="px">8 px</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="name">--space-3</div><div class="px">12 px</div><div class="bar" style="width:12px"></div></div>
  <div class="row"><div class="name">--space-4</div><div class="px">16 px</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="name">--space-5</div><div class="px">24 px</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="name">--space-6</div><div class="px">32 px</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="name">--space-7</div><div class="px">48 px</div><div class="bar" style="width:48px"></div></div>
  <div class="row"><div class="name">--space-8</div><div class="px">64 px</div><div class="bar" style="width:64px"></div></div>
  <div class="row"><div class="name">--space-9</div><div class="px">96 px</div><div class="bar" style="width:96px"></div></div>
  <div class="row"><div class="name">--space-10</div><div class="px">128 px</div><div class="bar" style="width:128px"></div></div>
  <div class="row"><div class="name">--space-11</div><div class="px">192 px</div><div class="bar" style="width:192px"></div></div>
</body>
</html>
