<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Iconography — Lucide Set</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html,body{margin:0;padding:0;}
  body { background: var(--void-black); width:700px; padding: 32px; font-family:'DM Sans',sans-serif; color: var(--ash-silver);}
  .meta { font-size: 10px; letter-spacing:.12em; text-transform: uppercase; color: var(--ash-silver); margin-bottom: 14px;}
  .grid { display:grid; grid-template-columns: repeat(8, 1fr); gap: 14px;}
  .cell { display:flex; flex-direction:column; align-items:center; gap: 6px; padding: 10px 4px;
          border: 1px solid rgba(166,169,176,.15); background: rgba(16,38,61,.45);}
  .cell svg { stroke: var(--aged-gold); stroke-width: 1.5;}
  .name { font-size: 9px; letter-spacing:.10em; text-transform: uppercase; color: var(--ash-silver); opacity: .85;}
  .footer { font-family: 'Cormorant Garamond',serif; font-style: italic; font-size: 14px;
            color: var(--ash-silver); margin-top: 18px; line-height: 1.5;}
</style>
</head>
<body>
  <div class="meta">Lucide · 1.5px stroke · gold accent · Mass-Effect / Civ-VI proxy</div>
  <div class="grid" id="grid"></div>
  <div class="footer">Substitution flag — until a custom Paragon sigil set is commissioned, Lucide ships as the production icon family.</div>
  <script>
    const icons = ['compass','scroll','book-open','brain','network','sparkles','swords','flame','feather','telescope','crown','key','map','gem','shield','wand'];
    const grid = document.getElementById('grid');
    icons.forEach(n => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.innerHTML = `<i data-lucide="${n}" width="22" height="22"></i><div class="name">${n}</div>`;
      grid.appendChild(cell);
    });
    lucide.createIcons();
  </script>
</body>
</html>
