<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Display Type — Cinzel</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;}
  body { background: var(--void-black); width:700px; padding: 28px; }
  .stack > * + * { margin-top: 18px; }
  .meta { font-family: var(--font-utility); font-size: 10px; letter-spacing: 0.12em;
          text-transform: uppercase; color: var(--ash-silver); margin-bottom: 4px;}
  .hero { font-family: 'Cinzel', serif; font-weight:700; color: var(--signal-ivory);
          font-size: 56px; letter-spacing: 0.18em; line-height: 0.95;
          text-shadow: var(--shadow-text-bevel);}
  .h1 { font-family:'Cinzel',serif; font-weight:700; color:var(--signal-ivory);
        font-size: 32px; letter-spacing: 0.08em; text-transform: uppercase; line-height:1.1;}
  .h2 { font-family:'Cinzel',serif; font-weight:600; color:var(--signal-ivory);
        font-size: 22px; letter-spacing: 0.10em; text-transform: uppercase;}
  .h3 { font-family:'Cinzel',serif; font-weight:600; color:var(--ash-silver);
        font-size: 14px; letter-spacing: 0.18em; text-transform: uppercase;}
</style>
</head>
<body>
  <div class="stack">
    <div>
      <div class="meta">Hero · Cinzel 700 · 56–80 · tracking 0.18em</div>
      <div class="hero">PARAGON</div>
    </div>
    <div>
      <div class="meta">H1 · Cinzel 700 · 32 · tracking 0.08em</div>
      <div class="h1">Legacy Through Transformation</div>
    </div>
    <div>
      <div class="meta">H2 · Cinzel 600 · 22 · tracking 0.10em</div>
      <div class="h2">Featured Work</div>
    </div>
    <div>
      <div class="meta">H3 · Cinzel 600 · 14 · tracking 0.18em</div>
      <div class="h3">◈ Portfolio</div>
    </div>
  </div>
</body>
</html>
